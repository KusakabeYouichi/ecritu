name: iOS CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Normalize shared scheme
        run: bash tools/normalize_unicode_project_names.sh

      - name: Swift style check
        run: bash tools/check_top_level_brace_blank_lines.sh

      - name: Pick an available iPhone simulator
        id: simulator
        shell: bash
        run: |
          set -euo pipefail

          SIM_UDID="$(xcrun simctl list devices available | sed -nE 's/^[[:space:]]*iPhone[^()]* \(([A-F0-9-]+)\) \((Booted|Shutdown)\).*/\1/p' | head -n 1)"

          if [[ -z "$SIM_UDID" ]]; then
            echo "No available iPhone simulator found" >&2
            xcrun simctl list devices available
            exit 1
          fi

          echo "Selected simulator: $SIM_UDID"
          echo "udid=$SIM_UDID" >> "$GITHUB_OUTPUT"

      - name: Build and run tests
        shell: bash
        run: |
          set -euo pipefail

          xcrun simctl boot "${{ steps.simulator.outputs.udid }}" >/dev/null 2>&1 || true
          xcrun simctl bootstatus "${{ steps.simulator.outputs.udid }}" -b

          xcodebuild \
            -project "écritu.xcodeproj" \
            -scheme "écritu" \
            -destination "id=${{ steps.simulator.outputs.udid }}" \
            -derivedDataPath "build-ci" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            test
