name: écritu
options:
  deploymentTarget:
    iOS: "16.0"
settings:
  base:
    SWIFT_VERSION: 5.0

targets:
  écritu:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    configFiles:
      Debug: Config/Edition.xcconfig
      Release: Config/Edition.xcconfig
    sources:
      - path: App
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kusakabe.ecritu
        DEVELOPMENT_TEAM: 487V53DJMW
        MARKETING_VERSION: 1.0
        CURRENT_PROJECT_VERSION: $(ECRITU_EDITION_NUMBER)
        CODE_SIGN_ENTITLEMENTS: App/Ecritu.entitlements
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: écritu
        INFOPLIST_KEY_CFBundleShortVersionString: 1.0
        INFOPLIST_KEY_CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        INFOPLIST_KEY_EcrituEditionUpdatedAt: $(ECRITU_EDITION_UPDATED_AT)
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
    dependencies:
      - target: KeyboardExtension
        embed: true

  KeyboardExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "16.0"
    configFiles:
      Debug: Config/Edition.xcconfig
      Release: Config/Edition.xcconfig
    sources:
      - path: KeyboardExtension
        excludes:
          - Info.plist
      - path: tmp/ÉcrituPremierVocab.json
        buildPhase: resources
      - path: tmp/ÉcrituSecondVocab.json
        buildPhase: resources
      - path: tmp/kana_kanji_candidate_sources.json
        buildPhase: resources
      - path: tmp/kana_kanji_inflection_dictionary.json
        buildPhase: resources
      - path: tmp/kana_kanji_dictionary.sqlite
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kusakabe.ecritu.keyboard
        DEVELOPMENT_TEAM: 487V53DJMW
        MARKETING_VERSION: 1.0
        CURRENT_PROJECT_VERSION: $(ECRITU_EDITION_NUMBER)
        CODE_SIGN_ENTITLEMENTS: KeyboardExtension/KeyboardExtension.entitlements
        INFOPLIST_FILE: KeyboardExtension/Info.plist
        APPLICATION_EXTENSION_API_ONLY: YES
        SKIP_INSTALL: YES
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO

  écrituTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "16.0"
    configFiles:
      Debug: Config/Edition.xcconfig
      Release: Config/Edition.xcconfig
    sources:
      - path: Tests
      - path: KeyboardExtension/KeyboardModeTransition.swift
      - path: KeyboardExtension/FlickKanaMap.swift
      - path: KeyboardExtension/FlickKanaLayout.swift
      - path: KeyboardExtension/KanaKanjiConverter.swift
      - path: KeyboardExtension/KanaKanjiStore.swift
      - path: KeyboardExtension/KanaKanjiSeedDictionary.swift
      - path: KeyboardExtension/KanaKanjiTypes.swift
      - path: KeyboardExtension/KanaTextNormalizer.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kusakabe.ecritu.tests
        CURRENT_PROJECT_VERSION: $(ECRITU_EDITION_NUMBER)
        GENERATE_INFOPLIST_FILE: YES
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO

schemes:
  écritu:
    build:
      targets:
        écritu: all
    test:
      gatherCoverageData: false
      targets:
        - name: écrituTests
