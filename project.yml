name: écritu
options:
  deploymentTarget:
    iOS: "16.0"
settings:
  base:
    SWIFT_VERSION: 5.0

targets:
  écritu:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    configFiles:
      Debug: Config/Edition.xcconfig
      Release: Config/Edition.xcconfig
    sources:
      - path: App
      - path: third_party/APP_STORE_OPEN_SOURCE_NOTICES.md
        buildPhase: resources
      - path: third_party/sudachidict/LICENSE-2.0.txt
        buildPhase: resources
      - path: third_party/sudachidict/LEGAL
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: $(ECRITU_APP_BUNDLE_IDENTIFIER)
        DEVELOPMENT_TEAM: $(ECRITU_DEVELOPMENT_TEAM)
        MARKETING_VERSION: 1.0
        CURRENT_PROJECT_VERSION: $(ECRITU_EDITION_NUMBER)
        CODE_SIGN_ENTITLEMENTS: App/Ecritu.entitlements
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: écritu
        INFOPLIST_KEY_CFBundleShortVersionString: 1.0
        INFOPLIST_KEY_CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        INFOPLIST_KEY_EcrituEditionUpdatedAt: $(ECRITU_EDITION_UPDATED_AT)
        INFOPLIST_KEY_EcrituAppGroupIdentifier: $(ECRITU_APP_GROUP_IDENTIFIER)
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
    dependencies:
      - target: KeyboardExtension
        embed: true
    preBuildScripts:
      - name: Enforce Blank Line After Top-Level Brace
        basedOnDependencyAnalysis: false
        script: |
          bash "$SRCROOT/tools/check_top_level_brace_blank_lines.sh"

  KeyboardExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "16.0"
    configFiles:
      Debug: Config/Edition.xcconfig
      Release: Config/Edition.xcconfig
    sources:
      - path: KeyboardExtension
        excludes:
          - Info.plist
      - path: KeyboardExtension/DefaultDictionaryResources/ÉcrituPremierVocab.json
        buildPhase: resources
      - path: KeyboardExtension/DefaultDictionaryResources/ÉcrituSecondVocab.json
        buildPhase: resources
      - path: KeyboardExtension/DefaultDictionaryResources/kana_kanji_candidate_sources.json
        buildPhase: resources
      - path: KeyboardExtension/DefaultDictionaryResources/kana_kanji_inflection_dictionary.json
        buildPhase: resources
      - path: KeyboardExtension/DefaultDictionaryResources/kana_kanji_dictionary.sqlite
        buildPhase: resources
    preBuildScripts:
      - name: Enforce Blank Line After Top-Level Brace
        basedOnDependencyAnalysis: false
        script: |
          bash "$SRCROOT/tools/check_top_level_brace_blank_lines.sh"
      - name: Refresh Simulator Dictionary Artifacts
        basedOnDependencyAnalysis: false
        script: |
          bash "$SRCROOT/tools/refresh_simulator_dictionary_on_build.sh"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: $(ECRITU_KEYBOARD_BUNDLE_IDENTIFIER)
        DEVELOPMENT_TEAM: $(ECRITU_DEVELOPMENT_TEAM)
        MARKETING_VERSION: 1.0
        CURRENT_PROJECT_VERSION: $(ECRITU_EDITION_NUMBER)
        CODE_SIGN_ENTITLEMENTS: KeyboardExtension/KeyboardExtension.entitlements
        INFOPLIST_FILE: KeyboardExtension/Info.plist
        APPLICATION_EXTENSION_API_ONLY: YES
        SKIP_INSTALL: YES
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO

  écrituTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "16.0"
    configFiles:
      Debug: Config/Edition.xcconfig
      Release: Config/Edition.xcconfig
    sources:
      - path: Tests
      - path: KeyboardExtension/KeyboardModeTransition.swift
      - path: KeyboardExtension/FlickKanaMap.swift
      - path: KeyboardExtension/FlickKanaLayout.swift
      - path: KeyboardExtension/KanaKanjiConverter.swift
      - path: KeyboardExtension/KanaKanjiStore.swift
      - path: KeyboardExtension/KanaKanjiSeedDictionary.swift
      - path: KeyboardExtension/KanaKanjiTypes.swift
      - path: KeyboardExtension/KanaTextNormalizer.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: $(ECRITU_TESTS_BUNDLE_IDENTIFIER)
        CURRENT_PROJECT_VERSION: $(ECRITU_EDITION_NUMBER)
        GENERATE_INFOPLIST_FILE: YES
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
    preBuildScripts:
      - name: Enforce Blank Line After Top-Level Brace
        basedOnDependencyAnalysis: false
        script: |
          bash "$SRCROOT/tools/check_top_level_brace_blank_lines.sh"

schemes:
  écritu:
    build:
      targets:
        écritu: all
    test:
      gatherCoverageData: false
      targets:
        - name: écrituTests
